<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background tile -->
  <rect width="32" height="32" rx="7" fill="#1C1C1E"/>
  <!-- Vault door outer ring -->
  <circle cx="16" cy="16" r="12" fill="#2C2C2E" stroke="#48484A" stroke-width="1.5"/>
  <!-- Vault door inner groove -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#3A3A3C" stroke-width="1"/>
  <!-- Wheel spoke - vertical -->
  <line x1="16" y1="9" x2="16" y2="23" stroke="#FF6B6B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Wheel spoke - horizontal -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="#FF6B6B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="2.8" fill="#FF6B6B"/>
  <circle cx="16" cy="16" r="1.2" fill="#FF8E8E"/>
  <!-- Rivets at N/E/S/W -->
  <circle cx="16" cy="4.5" r="1.1" fill="#636366"/>
  <circle cx="27.5" cy="16" r="1.1" fill="#636366"/>
  <circle cx="16" cy="27.5" r="1.1" fill="#636366"/>
  <circle cx="4.5" cy="16" r="1.1" fill="#636366"/>
  <!-- Hinge bar on left -->
  <rect x="2.5" y="11" width="2" height="10" rx="1" fill="#3A3A3C" stroke="#48484A" stroke-width="0.5"/>
</svg>
